name: Desktop release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Verify tag matches desktop version
        if: startsWith(github.ref, 'refs/tags/v')
        run: node -e "const p=require('./packages/desktop/package.json'); const expected='v'+p.version; if(process.env.GITHUB_REF_NAME!==expected){throw new Error('Tag '+process.env.GITHUB_REF_NAME+' does not match desktop version '+expected)}"
      - run: npm test

  windows:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x64
          - arm64
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run desktop:package:win:${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-${{ matrix.arch }}
          path: |
            packages/desktop/release/*.exe
          if-no-files-found: error

  linux:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install Linux packaging tools
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libopenjp2-tools rpm libarchive-tools
      - run: npm ci
      - run: npm run desktop:package:linux:${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-${{ matrix.arch }}
          path: |
            packages/desktop/release/*.AppImage
            packages/desktop/release/*.deb
            packages/desktop/release/*.rpm
            packages/desktop/release/*.pacman
            packages/desktop/release/*.pkg.tar.zst
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - windows
      - linux
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - name: Create checksums
        working-directory: release
        run: sha256sum * > SHA256SUMS.txt
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --generate-notes
          gh release upload "$TAG" release/* --clobber
